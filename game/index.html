<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>No Way Down | Videojuego cooperativo 2D de supervivencia zombi</title>
    <meta
      name="description"
      content="Juega No Way Down, un videojuego web cooperativo 2D de supervivencia zombi ambientado en la Casa Central del Banco Nación. Desciende piso por piso, rescata aliados y sobrevive a la horda."
    />
    <meta
      name="keywords"
      content="No Way Down, videojuego cooperativo, juego zombi 2D, survival horror web, Phaser, Banco Nación, juego de supervivencia"
    />
    <meta name="author" content="No Way Down" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="/" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="theme-color" content="#111827" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="No Way Down" />
    <meta property="og:title" content="No Way Down | Videojuego cooperativo 2D de supervivencia zombi" />
    <meta
      property="og:description"
      content="Sobrevive al descenso en No Way Down, un videojuego web cooperativo 2D con zombis, rescates, combates tácticos y una campaña ambientada en Buenos Aires."
    />
    <meta property="og:image" content="/favicon.png" />
    <meta property="og:url" content="/" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="No Way Down | Videojuego cooperativo 2D de supervivencia zombi" />
    <meta
      name="twitter:description"
      content="Videojuego web cooperativo 2D de supervivencia zombi: desciende, rescata aliados y sobrevive en No Way Down."
    />
    <meta name="twitter:image" content="/favicon.png" />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "VideoGame",
        "name": "No Way Down",
        "description": "Videojuego web cooperativo 2D de supervivencia zombi ambientado en la Casa Central del Banco Nación.",
        "applicationCategory": "Game",
        "operatingSystem": "Web browser",
        "gamePlatform": "Web browser",
        "genre": ["Supervivencia", "Zombis", "Cooperativo", "Acción 2D"],
        "inLanguage": "es",
        "playMode": ["SinglePlayer", "CoOp"],
        "url": "/",
        "image": "/favicon.png"
      }
    </script>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
      }

      body {
        display: grid;
        place-items: center;
        overflow: hidden;
        background: radial-gradient(circle at top, #1f2937 0%, #020617 72%);
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }

      #app {
        width: 100vw;
        width: 100dvw;
        height: 100vh;
        height: 100dvh;
        display: grid;
        place-items: center;
      }

      #app canvas {
        display: block;
      }

      #unsupported-screen {
        width: min(90vw, 740px);
        padding: 2rem;
        border: 1px solid rgba(148, 163, 184, 0.55);
        border-radius: 1rem;
        text-align: center;
        font-size: clamp(1.1rem, 2vw, 1.5rem);
        line-height: 1.5;
        color: #e2e8f0;
        background: rgba(15, 23, 42, 0.92);
        box-shadow: 0 22px 48px rgba(2, 6, 23, 0.6);
      }

      @media (max-width: 959px), (max-height: 539px), (hover: none) and (pointer: coarse) {
        body:not(.unsupported-device) {
          background: #020617;
        }
      }
    </style>
  </head>
  <body>
    <main id="app" aria-label="No Way Down game"></main>
    <section id="unsupported-screen" hidden aria-live="polite"></section>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
