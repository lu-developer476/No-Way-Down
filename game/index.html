<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>No Way Down</title>
    <link rel="icon" type="image/png" href="/favicon.png" sizes="32x32" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <meta name="theme-color" content="#111827" />
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
      }

      body {
        display: grid;
        place-items: center;
        overflow: hidden;
        background: radial-gradient(circle at top, #1f2937 0%, #020617 72%);
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }

      #app {
        width: 100vw;
        width: 100dvw;
        height: 100vh;
        height: 100dvh;
        display: grid;
        place-items: center;
      }

      #app canvas {
        display: block;
      }

      #unsupported-screen {
        width: min(90vw, 740px);
        padding: 2rem;
        border: 1px solid rgba(148, 163, 184, 0.55);
        border-radius: 1rem;
        text-align: center;
        font-size: clamp(1.1rem, 2vw, 1.5rem);
        line-height: 1.5;
        color: #e2e8f0;
        background: rgba(15, 23, 42, 0.92);
        box-shadow: 0 22px 48px rgba(2, 6, 23, 0.6);
      }

      @media (max-width: 1279px), (max-height: 719px), (hover: none) and (pointer: coarse) {
        body:not(.unsupported-device) {
          background: #020617;
        }
      }
    </style>
  </head>
  <body>
    <main id="app" aria-label="No Way Down game"></main>
    <section id="unsupported-screen" hidden aria-live="polite"></section>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
